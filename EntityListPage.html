<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Portal — Entity List</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    /* ── IES / IDS Design Tokens ─────────────────────────────────────────── */
    :root {
      /* IES Brand colors */
      --ies-navy:       #00254a;   /* primary action, topbar */
      --ies-navy-hover: #001d3c;
      --ies-teal:       #00b797;   /* spearmint-60, accents */
      --ies-teal-light: #ecfff7;
      --ies-link:       #205ea3;   /* IES link blue */
      --ies-link-hover: #17497f;

      /* Semantic */
      --color-text-primary:   #0d233a;
      --color-text-secondary: #405161;
      --color-text-tertiary:  #607280;
      --color-text-disabled:  #859299;
      --color-text-inverse:   #ffffff;
      --color-text-negative:  #d52b1e;

      --color-bg-page:        #f0f4f6;
      --color-bg-primary:     #ffffff;
      --color-bg-secondary:   #f8fafb;
      --color-bg-tertiary:    #f0f4f6;
      --color-bg-dark:        #21262a;
      --color-bg-navy:        #00254a;

      --color-border-primary:   #e2e9ed;
      --color-border-secondary: #c3ced5;
      --color-border-focus:     #205ea3;

      --color-divider:    #e2e9ed;

      --color-icon-primary:   #0d233a;
      --color-icon-secondary: #607280;
      --color-icon-disabled:  #9aa7b0;

      /* Status colors */
      --color-pending:        #2b77cc;
      --color-pending-bg:     #e0edff;
      --color-linked:         #00a63b;
      --color-linked-bg:      #d2f8d5;
      --color-not-required:   #607280;
      --color-not-required-bg:#f0f4f6;
      --color-expired:        #c84f00;
      --color-expired-bg:     #ffeac7;
      --color-failed:         #b61a37;
      --color-failed-bg:      #ffe7e7;
      --color-not-linked:     #2b77cc;
      --color-not-linked-bg:  #e0edff;

      --color-warn-icon: #c84f00;
      --color-negative:  #b61a37;

      /* Typography */
      --font: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --fs-heading:   24px;
      --fs-body:      14px;
      --fs-body-sm:   13px;
      --fs-label:     12px;
      --fw-regular:   400;
      --fw-medium:    500;
      --fw-semibold:  600;
      --fw-bold:      700;
      --lh-body:      1.5;
      --lh-heading:   1.25;

      /* Radius */
      --r-card:   12px;
      --r-modal:  12px;
      --r-input:   8px;
      --r-btn:     8px;
      --r-badge:   6px;
      --r-tag:     4px;
      --r-full:  999px;

      /* Spacing */
      --sp-2:  2px;  --sp-4:  4px;  --sp-6:  6px;
      --sp-8:  8px;  --sp-12: 12px; --sp-16: 16px;
      --sp-20: 20px; --sp-24: 24px; --sp-32: 32px;
      --sp-40: 40px;

      /* Elevation — IDS levels */
      --shadow-card:    0 2px 8px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.05);
      --shadow-modal:   0 16px 48px rgba(0,0,0,0.18), 0 0 4px rgba(0,0,0,0.06);
      --shadow-toast:   0px 8px 24px rgba(0,0,0,0.16), 0px 2px 8px rgba(0,0,0,0.08); /* IDS Level 4 */
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(ellipse 80% 55% at 50% 110%, #0a3d5c 0%, #021929 55%, #00254a 100%);
      background-attachment: fixed;
      font-family: var(--font);
      font-size: var(--fs-body);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 0 12px 12px;
      box-sizing: border-box;
    }

    /* ── Loading screen ──────────────────────────────────────────────── */
    .loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000;
      background: radial-gradient(ellipse 80% 55% at 50% 110%, #0a3d5c 0%, #021929 55%, #00254a 100%);
      font-family: var(--font);
    }
    .loading-screen.exit {
      animation: _loadingScreenOut 0.6s cubic-bezier(0.4,0,1,1) both;
    }
    @keyframes _loadingScreenOut {
      from { opacity: 1; transform: scale(1);    filter: blur(0px); }
      to   { opacity: 0; transform: scale(1.04); filter: blur(6px); }
    }

    /* Rocking asterisk icon */
    @keyframes _aiThink {
      0%   { transform: rotate(-22deg); }
      30%  { transform: rotate(22deg);  }
      55%  { transform: rotate(-14deg); }
      80%  { transform: rotate(18deg);  }
      100% { transform: rotate(-22deg); }
    }
    .loading-icon {
      animation: _aiThink 2.6s cubic-bezier(0.37, 0, 0.63, 1) infinite;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .loading-icon.exit {
      animation: _loadElemOut 0.3s cubic-bezier(0.4,0,1,1) both;
    }

    /* Shared enter / exit keyframes */
    @keyframes _loadElemIn {
      from { opacity: 0; transform: translateY(8px);  filter: blur(5px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
    }
    @keyframes _loadElemOut {
      from { opacity: 1; transform: translateY(0);     filter: blur(0);   }
      to   { opacity: 0; transform: translateY(-8px);  filter: blur(5px); }
    }

    /* "Loading" title — regular weight, ~16px, matches Figma */
    .loading-title {
      color: rgba(255,255,255,0.88);
      font-size: 16px;
      font-weight: var(--fw-regular);
      font-family: var(--font);
      letter-spacing: 0;
      margin-bottom: 18px;
      animation: _loadElemIn 0.5s cubic-bezier(0.15,0,0.1,1) 0.1s both;
    }
    .loading-title.exit {
      animation: _loadElemOut 0.3s cubic-bezier(0.4,0,1,1) both;
    }

    /* Welcome message — larger, character-by-character reveal */
    .loading-welcome {
      color: rgba(255,255,255,0.92);
      font-size: 26px;
      font-weight: var(--fw-semibold);
      font-family: var(--font);
      letter-spacing: -0.01em;
      text-align: center;
      line-height: 1.3;
    }
    @keyframes _charIn {
      from { opacity: 0; filter: blur(6px); transform: translateY(6px); }
      to   { opacity: 1; filter: blur(0);   transform: translateY(0); }
    }
    .loading-welcome-char {
      display: inline-block;
      animation: _charIn 0.4s cubic-bezier(0.15,0,0.1,1) both;
      white-space: pre;
    }

    /* Pill status items — dark translucent, no dot, matches Figma */
    .loading-pills {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .loading-pill {
      display: inline-flex; align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 13px;
      font-family: var(--font);
      color: rgba(255,255,255,0.6);
      font-weight: var(--fw-regular);
      animation: _loadElemIn 0.4s cubic-bezier(0.15,0,0.1,1) both;
    }
    .loading-pill.exit {
      animation: _loadElemOut 0.28s cubic-bezier(0.4,0,1,1) both;
    }

    /* ── Portal card ─────────────────────────────────────────────────── */
    .portal-card {
      background: var(--color-bg-primary);
      border-radius: 12px;
      overflow: hidden;
      min-height: calc(100vh - 52px - 12px);
    }

    /* ── Topbar ──────────────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--sp-24); height: 52px;
      background: transparent;
      position: relative;
    }
    .topbar-title {
      font-size: var(--fs-body);
      font-weight: var(--fw-bold);
      color: var(--color-text-inverse);
      letter-spacing: 0.01em;
    }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border: none; background: transparent; cursor: pointer;
      border-radius: var(--r-badge);
      color: rgba(255,255,255,0.7);
      transition: background .15s, color .15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .icon-btn.dark { color: var(--color-icon-secondary); }
    .icon-btn.dark:hover { background: var(--color-bg-tertiary); color: var(--color-icon-primary); }

    /* ── User menu dropdown ──────────────────────────────────────────── */
    .user-menu {
      background: white; border-radius: var(--r-card);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
      padding: var(--sp-16); min-width: 220px;
      display: flex; flex-direction: column; align-items: center; gap: var(--sp-8);
    }
    .user-menu-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: #2d7ed6; color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: var(--fw-bold);
      margin-bottom: 2px;
    }
    .user-menu-name {
      font-size: var(--fs-body); font-weight: var(--fw-bold);
      color: var(--color-text-primary); text-align: center;
    }
    .user-menu-email {
      font-size: var(--fs-caption); color: var(--color-text-secondary);
      text-align: center; margin-bottom: 4px;
    }
    .user-menu-divider { width: 100%; height: 1px; background: var(--color-border-primary); margin: 4px 0; }
    .user-menu-signout {
      width: 100%; padding: 9px 0; border: 1px solid var(--color-border-secondary);
      border-radius: var(--r-btn); background: white;
      font-size: var(--fs-body); font-weight: var(--fw-semibold);
      color: var(--color-text-primary); cursor: pointer; font-family: var(--font);
      transition: background .15s;
    }
    .user-menu-signout:hover { background: var(--color-bg-secondary); }

    /* ── Column header tooltip ───────────────────────────────────────── */
    .th-tooltip-wrap { position: relative; display: inline-flex; align-items: center; gap: 4px; }
    .th-tooltip-enter { animation: _tooltipIn  0.16s cubic-bezier(0.15,0,0.1,1) both; }
    .th-tooltip-exit  { animation: _tooltipOut 0.12s cubic-bezier(0.4,0,1,1)    both; }
    @keyframes _tooltipIn  { from { opacity:0; transform:translateX(-50%) translateY(4px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes _tooltipOut { from { opacity:1; transform:translateX(-50%) translateY(0); } to { opacity:0; transform:translateX(-50%) translateY(4px); } }
    .th-tooltip {
      position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #21262a; color: white;
      font-size: 12px; font-weight: var(--fw-normal); line-height: 1.45;
      padding: 10px 12px; border-radius: 6px;
      width: 220px; z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
      pointer-events: none; white-space: normal;
    }
    .th-tooltip::before {
      content: ""; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      border: 6px solid transparent; border-bottom-color: #21262a;
    }
    .th-tooltip-title { font-weight: var(--fw-bold); margin-bottom: 4px; font-size: 12px; }

    /* ── Page content ────────────────────────────────────────────────── */
    .page-content { padding: var(--sp-32) var(--sp-40) var(--sp-40); }
    .page-heading {
      font-size: var(--fs-heading);
      font-weight: var(--fw-bold);
      color: var(--color-text-primary);
      line-height: var(--lh-heading);
      margin: 0 0 var(--sp-16) 0;
    }

    /* ── Status badge ────────────────────────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: var(--sp-8);
      border: 1px solid var(--color-border-primary);
      border-radius: var(--r-badge);
      padding: var(--sp-6) var(--sp-12);
      font-size: var(--fs-body);
      color: var(--color-text-primary);
      margin-bottom: var(--sp-24);
      background: var(--color-bg-primary);
    }
    .status-badge.complete {
      border-color: #b3cef0;
      background: #e8f1fb;
      color: var(--ies-link);
    }
    .info-banner {
      display: flex; align-items: flex-start; gap: var(--sp-12);
      background: var(--color-bg-primary); border: 1.5px solid var(--color-border-primary);
      border-radius: var(--r-badge);
      padding: var(--sp-12) var(--sp-16);
      font-size: var(--fs-body); color: var(--color-text-primary);
      margin-bottom: var(--sp-24);
      animation: _slideUp 0.28s cubic-bezier(0.15,0,0.1,1) both;
    }
    .info-banner-icon { color: var(--ies-link); flex-shrink:0; display:flex; margin-top:1px; }

    /* ── Filter / search ─────────────────────────────────────────────── */
    .filter-bar { display: flex; align-items: flex-end; gap: var(--sp-12); margin-bottom: var(--sp-16); }
    .filter-label { font-size: var(--fs-label); color: var(--color-text-tertiary); margin-bottom: 3px; display: block; font-weight: var(--fw-medium); }

    .select-wrap { position: relative; }
    .ids-select {
      appearance: none; height: 36px;
      border: 1.5px solid var(--color-border-primary);
      border-radius: var(--r-input);
      padding: 0 30px 0 var(--sp-12);
      font-size: var(--fs-body); font-family: var(--font);
      color: var(--color-text-primary);
      background: var(--color-bg-primary);
      cursor: pointer; outline: none; min-width: 172px;
      transition: border-color .15s;
    }
    .ids-select:hover { border-color: var(--color-border-secondary); }
    .ids-select:focus { border-color: var(--color-border-focus); box-shadow: 0 0 0 3px rgba(32,94,163,0.12); }
    .select-chev { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--color-icon-secondary); }

    /* ── Custom filter dropdown ──────────────────────────────────────── */
    .flt-trigger {
      display: inline-flex; align-items: center; justify-content: space-between;
      gap: var(--sp-8); height: 36px; min-width: 172px;
      padding: 0 10px 0 var(--sp-12);
      border: 1.5px solid var(--color-border-primary);
      border-radius: var(--r-input);
      background: var(--color-bg-primary);
      font-size: var(--fs-body); font-family: var(--font);
      color: var(--color-text-primary);
      cursor: pointer; outline: none;
      transition: border-color .15s;
    }
    .flt-trigger:hover { border-color: var(--color-border-secondary); }
    .flt-trigger.open { border-color: var(--color-border-focus); box-shadow: 0 0 0 3px rgba(32,94,163,0.12); }
    .flt-menu {
      background: var(--color-bg-primary);
      border: 1.5px solid var(--color-border-primary);
      border-radius: var(--r-input);
      box-shadow: 0px 8px 24px rgba(0,0,0,0.12), 0px 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .flt-menu-enter { animation: _slideUp   0.18s cubic-bezier(0.15,0,0.1,1) both; }
    .flt-menu-exit  { animation: _slideDown 0.15s cubic-bezier(0.4,0,1,1)    both; }
    .flt-option {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--sp-8); padding: 9px var(--sp-12);
      font-size: var(--fs-body); font-family: var(--font);
      color: var(--color-text-primary);
      cursor: pointer; background: none; border: none; width: 100%;
      text-align: left; white-space: nowrap;
      transition: background .12s;
    }
    .flt-option:hover { background: var(--color-bg-secondary); }
    .flt-option.selected { background: var(--color-bg-secondary); }

    .search-wrap {
      display: flex; align-items: center; gap: var(--sp-8); height: 36px;
      border: 1.5px solid var(--color-border-primary);
      border-radius: var(--r-input);
      padding: 0 var(--sp-12);
      background: var(--color-bg-primary);
      transition: border-color .15s;
    }
    .search-wrap:focus-within { border-color: var(--color-border-focus); box-shadow: 0 0 0 3px rgba(32,94,163,0.12); }
    .search-wrap input {
      border: none; outline: none; background: transparent;
      font-size: var(--fs-body); font-family: var(--font);
      color: var(--color-text-primary); width: 130px;
    }
    .search-wrap input::placeholder { color: var(--color-text-tertiary); }

    /* ── Bulk toolbar ────────────────────────────────────────────────── */
    .bulk-toolbar {
      display: inline-flex; align-items: center; gap: var(--sp-8);
      background: #2b3135;
      border-radius: var(--r-btn); padding: var(--sp-8) var(--sp-12);
    }
    .bulk-label { font-size: var(--fs-label); color: #859299; font-weight: var(--fw-semibold); white-space: nowrap; }
    .bulk-btn {
      height: 28px; padding: 0 var(--sp-12);
      border: none; border-radius: var(--r-badge);
      background: #3c4348; color: white;
      font-size: var(--fs-label); font-family: var(--font);
      font-weight: var(--fw-bold); cursor: pointer; transition: background .15s;
      white-space: nowrap;
    }
    .bulk-btn:hover { background: #4c555b; }
    .bulk-count { font-size: var(--fs-label); color: var(--color-text-tertiary); margin-top: 4px; padding-left: 2px; }

    /* ── Table ───────────────────────────────────────────────────────── */
    .ids-table-container { width: 100%; }
    .ids-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .ids-table thead tr { background: var(--color-bg-primary); }
    .ids-table th { padding: var(--sp-12) var(--sp-16); text-align: left; font-size: var(--fs-label); font-weight: var(--fw-bold); color: var(--color-text-primary); white-space: nowrap; }
    .ids-table td { padding: 13px var(--sp-16); font-size: var(--fs-body); color: var(--color-text-primary); border-bottom: 1px solid var(--color-divider); }
    /* Body border via first/last td borders */
    .ids-tbody-bordered tr td { border-top: none; }
    .ids-tbody-bordered tr:first-child td { border-top: 1.5px solid var(--color-border-primary); }
    .ids-tbody-bordered tr:last-child td { border-bottom: none; }
    .ids-tbody-bordered tr td:first-child { border-left: 1.5px solid var(--color-border-primary); }
    .ids-tbody-bordered tr td.col-cb.collapsed + td { border-left: 1.5px solid var(--color-border-primary); }
    .ids-tbody-bordered tr:first-child td.col-cb.collapsed + td { border-top-left-radius: var(--r-badge); }
    .ids-tbody-bordered tr:last-child td.col-cb.collapsed + td { border-bottom-left-radius: var(--r-badge); }
    .ids-tbody-bordered tr td:last-child { border-right: 1.5px solid var(--color-border-primary); }
    /* Bottom border on last row */
    .ids-tbody-bordered tr:last-child td { border-bottom: 1.5px solid var(--color-border-primary); }
    /* Rounded corners on corner cells */
    .ids-tbody-bordered tr:first-child td:first-child { border-top-left-radius: var(--r-badge); }
    .ids-tbody-bordered tr:first-child td:last-child { border-top-right-radius: var(--r-badge); }
    .ids-tbody-bordered tr:last-child td:first-child { border-bottom-left-radius: var(--r-badge); }
    .ids-tbody-bordered tr:last-child td:last-child { border-bottom-right-radius: var(--r-badge); }
    /* Row transition */
    .ids-table tbody tr { transition: background .1s; }
    .ids-table tbody tr:hover { background: var(--color-bg-secondary); }
    .ids-table tbody tr.selected { background: #f0f6ff; }
    @keyframes _rowFlash {
      0%   { background: #F5FCFF; }
      40%  { background: #F5FCFF; }
      100% { background: transparent; }
    }
    .ids-table tbody tr.row-updated { animation: _rowFlash 2s cubic-bezier(0.4, 0, 0.6, 1) forwards; }

    /* ── Checkbox ────────────────────────────────────────────────────── */
    .ids-cb {
      width: 16px; height: 16px; border-radius: var(--r-tag);
      border: 1.5px solid var(--color-border-secondary);
      background: var(--color-bg-primary);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: border-color .12s, background .12s;
    }
    .ids-cb.on { background: var(--ies-navy); border-color: var(--ies-navy); }
    .ids-cb:hover:not(.on) { border-color: var(--ies-link); }

    /* ── Linking status badges (table) ───────────────────────────────── */
    .ls-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: var(--fs-body); cursor: pointer;
      transition: opacity .12s;
    }
    .ls-badge:hover { opacity: 0.75; }
    .ls-badge.pending   { color: var(--color-pending); font-weight: var(--fw-semibold); }
    .ls-badge.linked    { color: var(--color-linked); }
    .ls-badge.not-required { color: var(--color-not-required); }
    .ls-badge.not-linked   { color: var(--color-not-linked); font-weight: var(--fw-semibold); }
    .ls-badge.expired   { color: var(--color-expired); font-weight: var(--fw-semibold); }
    .ls-badge.failed    { color: var(--color-failed); font-weight: var(--fw-semibold); }

    /* ── Checkbox column collapse on complete ────────────────────────── */
    @keyframes _cbOut { from { opacity:1; transform:scale(1); } to { opacity:0; transform:scale(0.5); } }
    .col-cb { transition: width 0.4s cubic-bezier(0.15,0,0.1,1), padding 0.4s cubic-bezier(0.15,0,0.1,1), opacity 0.3s ease; overflow:hidden; white-space:nowrap; }
    .col-cb.collapsing .cb-inner { animation: _cbOut 0.25s cubic-bezier(0.4,0,1,1) both; }

    const cfg = LINK_CFG[entity.linkingStatus] || LINK_CFG.NOT_LINKED;

    function handleResend() {
      setSending(true);

        setTimeout(() => setJustSent(false), 4000);

    const displayCfg = LINK_CFG[currentStatus] || cfg;

    return (

  /* ── Sliding tab bar ─────────────────────────────────────────────── */
  function TabBar({ tabs, active, onChange }) {
    const tabRefs = React.useRef({});
    const [indicator, setIndicator] = React.useState({ left: 0, width: 0 });
    const containerRef = React.useRef(null);

    useEffect(() => {
      const el = tabRefs.current[active];
      if (!el) return;
      // offsetLeft/offsetWidth are relative to offsetParent — reliable regardless of scroll
      setIndicator({ left: el.offsetLeft, width: el.offsetWidth });
    }, [active]);

    return (
      <div className="modal-tabs" ref={containerRef}>
        {tabs.map(t => (
          <button
            key={t}
            ref={el => tabRefs.current[t] = el}
            onClick={() => onChange(t)}
            className={`modal-tab${active === t ? " active" : ""}`}
          >{t}</button>
        ))}
        <div className="modal-tab-indicator" style={{ left: indicator.left, width: indicator.width }} />
      </div>
    );
  }

  /* ── Modal shell: handles overlay + exit animation ──────────────── */
  function ModalShell({ onClose, children }) {
    const [leaving, setLeaving] = useState(false);
    const afterRef = React.useRef(null);
    function dismiss(after) {
      afterRef.current = after || null;
      setLeaving(true);
    }
    useEffect(() => {
      if (!leaving) return;
      const t = setTimeout(() => {
        afterRef.current?.();
        onClose();
      }, 240);
      return () => clearTimeout(t);
    }, [leaving]);
    return (
      <DismissCtx.Provider value={dismiss}>
        <div
          className={`modal-overlay ${leaving ? "anim-overlay-out" : "anim-overlay"}`}
          onClick={e => e.target === e.currentTarget && dismiss()}
        >
          <div className={`modal ${leaving ? "anim-modal-out" : "anim-modal"}`}>
            {children}
          </div>
        </div>
      </DismissCtx.Provider>
    );
  }

  /* ── Animated height wrapper ─────────────────────────────────────── */
  function AnimHeight({ children }) {
    const outerRef = React.useRef(null);
    const innerRef = React.useRef(null);
    useEffect(() => {
      const inner = innerRef.current;
      const outer = outerRef.current;
      if (!inner || !outer) return;
      const ro = new ResizeObserver(() => {
        outer.style.height = inner.offsetHeight + "px";
      });
      ro.observe(inner);
      outer.style.height = inner.offsetHeight + "px";
      return () => ro.disconnect();
    }, []);
    return (
      <div className="modal-height-wrap" ref={outerRef}>
        <div ref={innerRef}>{children}</div>
      </div>
    );
  }

  /* ── Loading screen ──────────────────────────────────────────────── */
  const LOAD_STEPS = [
    { label: "Connecting to your account",  delay: 350  },
    { label: "Fetching company records",    delay: 800  },
    { label: "Loading payment methods",     delay: 1250 },
  ];
  // Phase timeline (ms):
  //   0        — screen mounts, icon rocks, title enters
  //   350–1250 — pills stagger in
  //   1800     — icon + title + pills all blur out together
  //   2120     — welcome text blurs in (alone, clean)
  //   4200     — full screen blurs out (welcome held for ~2s)
  //   4820     — onDone fires

  function LoadingScreen({ onDone }) {
    const [visibleSteps, setVisibleSteps] = React.useState([]);
    // phase: 'loading' | 'outro' | 'welcome' | 'exiting'
    const [phase, setPhase] = React.useState('loading');

    React.useEffect(() => {
      const timers = LOAD_STEPS.map((step, i) =>
        setTimeout(() => setVisibleSteps(p => [...p, i]), step.delay)
      );
      const outroTimer   = setTimeout(() => setPhase('outro'),   1800); // everything blurs out
      const welcomeTimer = setTimeout(() => setPhase('welcome'), 2120); // welcome blurs in
      const exitTimer    = setTimeout(() => setPhase('exiting'), 4200); // screen exits (~2s hold)
      const doneTimer    = setTimeout(onDone,                    4820);
      return () => {
        timers.forEach(clearTimeout);
        [outroTimer, welcomeTimer, exitTimer, doneTimer].forEach(clearTimeout);
      };
    }, []);

    const showLoading = phase === 'loading' || phase === 'outro';
    const showWelcome = phase === 'welcome' || phase === 'exiting';
    const isOutro     = phase === 'outro';

    return (
      <div className={`loading-screen${phase === 'exiting' ? " exit" : ""}`}>
        {/* Lucide asterisk icon — rocks back and forth, exits with everything else */}
        {showLoading && (
          <div className={`loading-icon${isOutro ? " exit" : ""}`}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="2"  x2="12" y2="22"/>
              <line x1="4.93" y1="4.93"  x2="19.07" y2="19.07"/>
              <line x1="2"  y1="12" x2="22" y2="12"/>
              <line x1="4.93" y1="19.07" x2="19.07" y2="4.93"/>
            </svg>
          </div>
        )}

        {/* Loading title — exits with blur when outro begins */}
        {showLoading && (
          <div className={`loading-title${isOutro ? " exit" : ""}`}>
            Loading your portal…
          </div>
        )}

        {/* Welcome — character-by-character blur-in */}
        {showWelcome && (
          <div className="loading-welcome">
            {"Welcome to your order portal, Jonathan".split("").map((ch, i) => (
              <span key={i} className="loading-welcome-char" style={{animationDelay:`${i * 28}ms`}}>
                {ch}
              </span>
            ))}
          </div>
        )}

        {/* Pills — stagger out when outro begins */}
        {showLoading && (
          <div className="loading-pills">
            {LOAD_STEPS.map((step, i) =>
              visibleSteps.includes(i) && (
                <div key={i} className={`loading-pill${isOutro ? " exit" : ""}`}
                     style={{animationDelay: isOutro ? `${i * 45}ms` : '0ms'}}>
                  {step.label}
                </div>
              )
            )}
          </div>
        )}
      </div>
    );
  }

        <div className="topbar pg-enter pg-d0">
          <span className="topbar-title"><span className="skel-wrap skel-d0">Order Portal</span></span>
          {toast&&ReactDOM.createPortal(<div style={{position:"fixed",top:"8px",left:"50%",transform:"translateX(-50%)",zIndex:9999}}><div className="anim-toast"><Toast message={toast} onDone={()=>setToast(null)}/></div></div>,document.body)}
          <div>
            <button ref={gearRef} className="icon-btn" onClick={()=>{ if(!showUserMenu) setShowUserMenu(true); }}>{Ico.gear()}</button>
            {showUserMenu && <UserMenu anchorRef={gearRef} onClose={()=>setShowUserMenu(false)}/>}
          </div>
        </div>

        <div className="portal-card portal-card-enter" style={{animationDelay:"120ms"}}>
          {/* Content */}
          <div className="page-content" style={{position:"relative"}}>
            <h1 className="page-heading pg-enter pg-d1">
              <span className="skel-wrap skel-d1">{allDone?"Your order will be placed shortly.":"Review your companies and edit any missing data"}</span>
            </h1>

            {/* Status badge */}
            {allDone && (
              <div className="info-banner">
                <span className="info-banner-icon">
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd"/></svg>
                </span>
                <span>All company information has been submitted. Your implementation consultant is reviewing the details and will reach out if they have any further questions.</span>
              </div>
            )}
            <div className={`status-badge pg-enter pg-d2${allDone?" complete":""}`}>
              {allDone
                ? <><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8.5" stroke="currentColor" strokeWidth="1.5"/><path d="M6.5 10l2.5 2.5 4.5-4.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg><span>{entities.length}/{entities.length} companies ready</span></>
                : <>{Ico.warn()}<span className="skel-wrap skel-d2">{incomplete}/{entities.length} companies incomplete</span></>}
            </div>

            {/* Toolbar */}
            <div className="pg-enter pg-d3" style={{minHeight:52,marginBottom:16}}>
              {selIds.size>0 ? (
                <div>
                  <div className="bulk-toolbar anim-slide-up">
                    <span className="bulk-label">Bulk actions</span>
                    <button className="bulk-btn" onClick={()=>setBulkMode("address")}>Edit address</button>
                    <button className="bulk-btn" onClick={()=>setBulkMode("payment")}>Edit payment method</button>
                    <button className="icon-btn" style={{color:"#859299",width:24,height:24}} onClick={()=>setSelIds(new Set())}>{Ico.x(14)}</button>
                  </div>
                  <div className="bulk-count">{selIds.size} {selIds.size===1?"entity":"entities"} selected</div>
                </div>
              ) : (
                <div className="filter-bar">
                  <div>
                    <label className="filter-label">Filter</label>
                    <FilterSelect
                      value={filter}
                      onChange={v=>{setFilter(v);setPage(1);}}
                      options={[
                        {value:'all',      label:'All companies'},
                        {value:'incomplete',label:'Needs attention'},
                        {value:'complete', label:'Complete'},
                      ]}
                    />
                  </div>
                  <div className="search-wrap">
                    <span style={{color:"var(--color-icon-secondary)",display:"flex",flexShrink:0}}>{Ico.search()}</span>
                    <input placeholder="Search" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
                  </div>
                </div>
              )}
            </div>

            {/* Table */}
            <div className="ids-table-container pg-enter pg-d4">
              <table className="ids-table">
                <thead>
                  <tr>
                    <th style={{width:44}} className={`col-cb${exitingCb?" collapsing":allDone?" collapsed":""}`}><div className="cb-inner"><CB checked={allPageSel} indeterminate={someSel} onChange={toggleAll}/></div></th>
                    <th><span className="skel-wrap skel-d4">Company name</span></th>
                    <th><ColHeader label="Address" tooltip="Make sure each company's legal name and address are correct. To update address info, go directly to QuickBooks Online." skelClass="skel-wrap skel-d4"/></th>
                    <th><ColHeader label="Payment" tooltip={'Choose how each company pays. You can apply one payment method to multiple companies at once. "Original QBO payment" keeps the payment already on file in QuickBooks Online.'} skelClass="skel-wrap skel-d4"/></th>
                    <th><ColHeader label="Linking status" tooltip="Linking syncs a company's QuickBooks Online account with your Enterprise Suite. It's a one-time step — it connects billing and data, but doesn't add users to the portal." skelClass="skel-wrap skel-d4"/></th>
                    <th className="col-ready"><span className="skel-wrap skel-d4">Ready</span></th>
                  </tr>
                </thead>
                <tbody className="ids-tbody-bordered">
                  {paginated.length===0
                    ? <tr><td colSpan={6} style={{textAlign:"center",padding:"48px 0",color:"var(--color-text-tertiary)"}}>No companies match your search.</td></tr>
                    : paginated.map((e,i)=><ERow key={updatedIds.has(e.id)?`${e.id}-u`:e.id} entity={e} selected={selIds.has(e.id)} updated={updatedIds.has(e.id)} allDone={allDone} exitingCb={exitingCb} rowIndex={i} onToggle={()=>toggleSel(e.id)} onEdit={handleEdit} onLinkClick={handleLinkClick}/>)}
                </tbody>
              </table>
              <div className="pagination">
                <span>{(page-1)*PAGE_SIZE+1}–{Math.min(page*PAGE_SIZE,filtered.length)} of {filtered.length} items</span>
                <div className="pg-controls">
                  <span>Page</span>
                  <span className="page-num">{page}</span>
                  <span>of {totalPages}</span>
                  <button className="pg-btn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page<=1}>{Ico.chevLeft()}</button>
                  <button className="pg-btn" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page>=totalPages}>{Ico.chevRight()}</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        {editTarget&&<EditModal entity={editTarget.entity} initialTab={editTarget.tab} readOnly={allDone} onClose={()=>setEditTarget(null)} onSave={handleSave} onResent={handleResent}/>}
        {bulkMode&&<BulkModal entities={selEntities} mode={bulkMode} onClose={()=>setBulkMode(null)} onSave={handleBulkSave}/>}
        </>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
