<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intuit Sign In</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
    --intuit-blue: #0077c5;
    --intuit-blue-dark: #055393;
    --intuit-blue-btn: #0077c5;
    --intuit-blue-btn-hover: #006aae;
    --intuit-text-primary: #393a3d;
    --intuit-text-secondary: #6b6c72;
    --intuit-text-link: #0077c5;
    --intuit-border: #babec5;
    --intuit-bg: #f4f5f8;
    --intuit-card-shadow: 0px 4px 16px rgba(0,0,0,0.20);
    --intuit-divider: #d4d7dc;
    --sp-4: 4px; --sp-8: 8px; --sp-12: 12px; --sp-16: 16px;
    --sp-20: 20px; --sp-24: 24px; --sp-32: 32px;
  }

  body {
    margin: 0;
    background: var(--intuit-bg);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Animations (same system as portal) ─────────────────────────── */
  @keyframes _slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes _slideDown {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(8px); }
  }
  @keyframes _fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes _cardOpen {
    from { opacity: 0; transform: scaleY(0); }
    to   { opacity: 1; transform: scaleY(1); }
  }
  @keyframes _pageIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes _screenOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-24px) scale(0.97); }
  }
  @keyframes _screenIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes _spin {
    to { transform: rotate(360deg); }
  }

  .pg-enter { animation: _pageIn 0.5s cubic-bezier(0.15,0,0.1,1) both; }
  .pg-d0 { animation-delay: 0ms; }
  .pg-d1 { animation-delay: 80ms; }
  .pg-d2 { animation-delay: 160ms; }
  .pg-d3 { animation-delay: 240ms; }
  .pg-d4 { animation-delay: 320ms; }

  .screen-out { animation: _screenOut 0.3s cubic-bezier(0.4,0,1,1) both; }
  .screen-in  { animation: _screenIn  0.4s cubic-bezier(0.15,0,0.1,1) both; }

  /* ── Card ────────────────────────────────────────────────────────── */
  .intuit-card {
    background: white;
    border: 1px solid var(--intuit-border);
    border-radius: 4px;
    box-shadow: var(--intuit-card-shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 361px;
    padding: 32px 0;
    gap: 18px;
  }

  /* ── Intuit wordmark ─────────────────────────────────────────────── */
  .intuit-wordmark {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #2ca01c;
    font-style: italic;
  }
  .intuit-wordmark span { color: var(--intuit-blue-dark); }

  /* ── Sign in form ────────────────────────────────────────────────── */
  .signin-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 224px;
    gap: 20px;
  }
  .signin-heading {
    font-size: 20px;
    font-weight: 600;
    color: var(--intuit-text-primary);
    text-align: center;
    line-height: 1.4;
  }
  .signin-fields {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 16px;
    width: calc(100% - 0px);
    box-sizing: border-box;
    padding: 0 16px;
  }
  .field-wrap { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .field-label {
    font-size: 14px;
    color: var(--intuit-text-secondary);
    font-weight: 400;
  }
  .field-input {
    width: 100%;
    height: 36px;
    border: 2px solid var(--intuit-blue-dark);
    border-radius: 4px;
    padding: 0 8px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--intuit-text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .field-input:focus { border-color: var(--intuit-blue-dark); box-shadow: 0 0 0 3px rgba(5,83,147,0.12); }
  .field-hint { font-size: 12px; color: var(--intuit-text-secondary); }

  .remember-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 24px 16px 0;
    width: 100%;
  }
  .remember-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--intuit-blue-dark); cursor: pointer; }
  .remember-row label { font-size: 16px; color: var(--intuit-text-secondary); cursor: pointer; font-weight: 500; }

  .signin-actions {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 0 16px;
    width: 100%;
    box-sizing: border-box;
    align-items: center;
  }

  .btn-intuit-primary {
    width: 100%;
    height: 36px;
    background: var(--intuit-blue-btn);
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-intuit-primary:hover { background: var(--intuit-blue-btn-hover); }
  .btn-intuit-primary:active { transform: scale(0.99); }
  .btn-intuit-primary:disabled { opacity: 0.7; cursor: default; }

  .btn-intuit-secondary {
    width: 100%;
    height: 36px;
    background: #e3e5e8;
    color: var(--intuit-text-primary);
    border: none;
    border-radius: 4px;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-intuit-secondary:hover { background: #d3d5d8; }

  .legal-text {
    font-size: 12px;
    color: var(--intuit-text-secondary);
    text-align: center;
    line-height: 1.4;
    width: 100%;
  }
  .legal-text a { color: var(--intuit-text-link); text-decoration: none; font-weight: 500; }
  .legal-text a:hover { text-decoration: underline; }

  .link-standalone {
    font-size: 16px;
    font-weight: 600;
    color: var(--intuit-text-link);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
  }
  .link-standalone:hover { text-decoration: underline; }

  .new-to-intuit {
    font-size: 16px;
    color: var(--intuit-text-primary);
    text-align: center;
  }
  .new-to-intuit a { color: var(--intuit-text-link); text-decoration: none; font-weight: 400; }
  .new-to-intuit a:hover { text-decoration: underline; }

  .divider { width: 100%; height: 1px; background: var(--intuit-divider); }

  /* ── Account picker card ─────────────────────────────────────────── */
  .account-card {
    background: white;
    border: 1px solid var(--intuit-border);
    border-radius: 4px;
    box-shadow: var(--intuit-card-shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 300px;
    padding: 24px 0 16px;
    gap: 18px;
  }

  .account-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #2d7ed6;
    color: white;
    font-size: 28px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .account-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--intuit-text-primary);
    text-align: center;
  }
  .account-email {
    font-size: 12px;
    color: var(--intuit-text-secondary);
    text-align: center;
  }
  .account-manage {
    font-size: 14px;
    font-weight: 500;
    color: var(--intuit-text-link);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
  }
  .account-manage:hover { text-decoration: underline; }
  .account-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .account-header-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .company-list { width: 100%; display: flex; flex-direction: column; }
  .company-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    cursor: pointer;
    transition: background 0.12s;
    border-top: 1px solid var(--intuit-divider);
    border-bottom: 1px solid var(--intuit-divider);
    position: relative;
  }
  .company-row + .company-row { border-top: none; }
  .company-row:hover { background: #f4f5f8; }
  .company-row:first-child { border-top: 1px solid var(--intuit-divider); }

  .company-logo {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #eceef1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .company-info { flex: 1; min-width: 0; }
  .company-name { font-size: 14px; font-weight: 700; color: #2b3135; line-height: 1.5; }
  .company-signed { font-size: 12px; color: var(--intuit-text-secondary); line-height: 1.4; }
  .company-chevron { color: #6b6c72; display: flex; flex-shrink: 0; }

  .account-actions { padding: 0 16px; width: 100%; box-sizing: border-box; }

  /* ── Spinner ─────────────────────────────────────────────────────── */
  .spinner-ring {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: _spin 0.7s linear infinite;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Icons ───────────────────────────────────────────────────────── */
const LockIcon = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" strokeWidth="1.4"/>
    <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
  </svg>
);

const ChevronRight = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

const BuildingIcon = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <rect x="2" y="5" width="12" height="9" rx="1" stroke="#6b6c72" strokeWidth="1.3"/>
    <path d="M5 5V4a1 1 0 011-1h4a1 1 0 011 1v1" stroke="#6b6c72" strokeWidth="1.3"/>
    <path d="M6 9h4M6 11.5h2" stroke="#6b6c72" strokeWidth="1.3" strokeLinecap="round"/>
  </svg>
);

/* ── Intuit wordmark (SVG text) ──────────────────────────────────── */
function IntuitWordmark() {
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width="90" height="18" viewBox="0 0 89.5135 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M45.9555 10.4174C45.9555 14.7978 49.5865 18 54.2015 18C58.8164 18 62.4544 14.7978 62.4544 10.4174V0.353485H57.9849V9.89757C57.9849 12.2611 56.3496 13.8552 54.1876 13.8552C52.0257 13.8552 50.3903 12.268 50.3903 9.89757V0.353485H45.9209L45.9486 10.4174H45.9555ZM74.3867 4.38044H79.7154V17.6742H84.1848V4.38044H89.5135V0.346554H74.3867V4.38044V4.38044ZM71.4972 0.346554H67.0277V17.6742H71.4972V0.346554ZM27.9045 4.38044H33.2332V17.6742H37.7027V4.38044H43.0313V0.346554H27.9045V4.38044ZM4.46944 0.346554H0V17.6742H4.46944V0.346554ZM25.5555 7.58259C25.5555 3.20216 21.9176 0 17.3026 0C12.6877 0 9.05668 3.20216 9.05668 7.58259V17.6742H13.5261V8.12322C13.5261 5.75972 15.1614 4.16558 17.3234 4.16558C19.4854 4.16558 21.1207 5.75279 21.1207 8.12322V17.6673H25.5901L25.5624 7.57566L25.5555 7.58259Z" fill="#236CFF"/>
      </svg>
    </div>
  );
}

/* ── Screen 1: Sign In ───────────────────────────────────────────── */
function SignInScreen({ onSignIn, exiting }) {
  const [email, setEmail] = useState('');
  const [remember, setRemember] = useState(true);
  const [loading, setLoading] = useState(false);

  function handleSubmit(e) {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => onSignIn(), 1200);
  }

  return (
    <div className={exiting ? 'screen-out' : 'screen-in'} style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div className="intuit-card">
        {/* Wordmark */}
        <div className="pg-enter pg-d0" style={{marginBottom:4}}>
          <IntuitWordmark/>
        </div>

        {/* Heading */}
        <div className="signin-content">
          <p className="signin-heading pg-enter pg-d1">Let's get you in to Intuit</p>
        </div>

        {/* Form */}
        <form onSubmit={handleSubmit} style={{width:'100%',display:'flex',flexDirection:'column',gap:0}} className="pg-enter pg-d2">
          <div className="signin-fields">
            <div className="field-wrap">
              <label className="field-label" htmlFor="email">Phone number, email, or user ID</label>
              <input
                id="email"
                className="field-input"
                type="text"
                value={email}
                onChange={e => setEmail(e.target.value)}
                autoFocus
              />
              <span className="field-hint">Standard call or SMS rates may apply</span>
            </div>
          </div>

          <div className="remember-row">
            <input type="checkbox" id="remember" checked={remember} onChange={e => setRemember(e.target.checked)}/>
            <label htmlFor="remember">Remember me</label>
          </div>

          <div className="signin-actions" style={{marginTop:24}}>
            <button type="submit" className="btn-intuit-primary" disabled={loading}>
              {loading
                ? <><div className="spinner-ring"/><span>Signing in…</span></>
                : <><LockIcon/><span>Sign in</span></>
              }
            </button>

            <p className="legal-text">
              By selecting Sign in for your <a href="#">Intuit Account</a>, you agree to our <a href="#">Terms</a>. Our <a href="#">Privacy Policy</a> applies to your personal data.
            </p>

            <button type="button" className="link-standalone">Try something else</button>

            <p className="new-to-intuit">New to Intuit? <a href="#">Create an account</a></p>

            <div className="divider"/>

            <p className="legal-text">
              Invisible reCAPTCHA by Google <a href="#">Privacy Policy</a> and <a href="#">Terms of Use</a>.
            </p>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ── Screen 2: Choose Account ────────────────────────────────────── */
function ChooseAccountScreen({ onChoose, onSignOut, exiting }) {
  const companies = [
    { id: 'conglomo', name: 'Conglomo, Inc.', last: 'Signed in 6 days ago' },
    { id: 'durry',    name: 'Durry, Inc.',    last: 'Signed in 8 days ago' },
  ];

  return (
    <div className={exiting ? 'screen-out' : 'screen-in'} style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div className="account-card">

        {/* User header */}
        <div className="account-header pg-enter pg-d0">
          <div className="account-avatar pg-enter pg-d0">J</div>
          <div className="account-header-inner">
            <p className="account-name pg-enter pg-d1">Jonathan Smith</p>
            <p className="account-email pg-enter pg-d1">jonathan_smith@qbo.com</p>
          </div>
          <button className="account-manage pg-enter pg-d2">Manage your Intuit Account</button>
        </div>

        {/* Company list */}
        <div className="company-list pg-enter pg-d3">
          {companies.map((c,i) => (
            <button
              key={c.id}
              className="company-row"
              style={{width:'100%',background:'none',border:'none',textAlign:'left',font:'inherit',
                borderTop: i===0 ? '1px solid var(--intuit-divider)' : 'none',
                borderBottom: '1px solid var(--intuit-divider)',
                cursor:'pointer'}}
              onClick={() => c.id === 'conglomo' && onChoose()}
            >
              <div className="company-logo"><BuildingIcon/></div>
              <div className="company-info">
                <div className="company-name">{c.name}</div>
                <div className="company-signed">{c.last}</div>
              </div>
              <div className="company-chevron"><ChevronRight/></div>
            </button>
          ))}
        </div>

        {/* Sign out */}
        <div className="account-actions pg-enter pg-d4">
          <button className="btn-intuit-secondary" style={{width:'100%'}} onClick={onSignOut}>Sign out</button>
        </div>
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────────────────────────── */
function App() {
  const initialScreen = new URLSearchParams(window.location.search).get('screen') === 'choose' ? 'choose' : 'signin';
  const [screen, setScreen] = useState(initialScreen);
  const [exiting, setExiting] = useState(false);

  function handleSignIn() {
    setExiting(true);
    setTimeout(() => {
      setExiting(false);
      setScreen('choose');
    }, 320);
  }

  function handleChoose() {
    setExiting(true);
    setTimeout(() => {
      window.location.href = 'EntityListPage.html';
    }, 320);
  }

  function handleSignOut() {
    setExiting(true);
    setTimeout(() => {
      setExiting(false);
      setScreen('signin');
    }, 320);
  }

  return (
    <div style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'24px',boxSizing:'border-box'}}>
      {screen === 'signin' && <SignInScreen onSignIn={handleSignIn} exiting={exiting}/>}
      {screen === 'choose' && <ChooseAccountScreen onChoose={handleChoose} onSignOut={handleSignOut} exiting={exiting}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
